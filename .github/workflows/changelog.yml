name: Discord Changelog Sync

on:
  workflow_dispatch:

  repository_dispatch:
    types: [trigger-changelog-sync]

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug Trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          date -u

      - name: Fetch Changelog
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANGELOG_CHANNEL_ID: ${{ secrets.CHANGELOG_CHANNEL_ID }}
        run: |
          node .github/scripts/fetch-changelog.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/changelog.json
          git add docs/data/changelog-state.json

          if ! git diff --staged --quiet; then
            git commit -m "Update changelog from Discord"
            git push
          else
            echo "No changes detected"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
